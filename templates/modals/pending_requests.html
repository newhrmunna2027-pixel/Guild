<div id="pendingModal" class="hidden fixed inset-0 bg-black/90 flex justify-center items-center z-[70] p-4" onclick="closePendingModal(event)">
    <div class="bg-[#161a24] border border-gray-700 rounded-2xl w-full max-w-2xl shadow-2xl flex flex-col h-[75vh]" onclick="event.stopPropagation()">
        
        <div class="bg-[#0f121a] p-4 border-b border-gray-800 flex justify-between items-center relative rounded-t-2xl">
            <h2 class="text-lg font-black text-yellow-500 flex items-center">
                <i class="fa-solid fa-user-clock mr-2"></i> Pending Requests 
                <span id="pTotal" class="text-xs bg-gray-800 border border-gray-600 px-2 py-0.5 rounded-full text-gray-300 ml-2 text-white">0</span>
            </h2>
            <button onclick="closePendingModal(null, true)" class="text-gray-400 hover:text-red-500 text-2xl transition">&times;</button>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto custom-scroll" id="pendingContent"></div>
    </div>
</div>

<script>
    let currentBotForPending = '';

    function openPendingModal(botName) {
        currentBotForPending = botName;
        const modal = document.getElementById('pendingModal');
        const content = document.getElementById('pendingContent');
        const pTotal = document.getElementById('pTotal');
        
        modal.classList.remove('hidden');
        content.innerHTML = '<div class="text-center mt-20 text-gray-500 font-bold"><i class="fa-solid fa-spinner fa-spin text-4xl mb-4 text-yellow-500"></i><br>Fetching Pending Requests...</div>';
        pTotal.innerText = "0";

        fetch(`${API_BASE}/friends/pending?bot_name=${encodeURIComponent(botName)}`)
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success' && data.data.pending) {
                pTotal.innerText = data.data.total_pending || data.data.pending.length;
                renderPendingTable(data.data.pending);
            } else {
                content.innerHTML = `<div class="text-center mt-20 text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation text-4xl mb-3"></i><br>${data.msg || "Failed to load API"}</div>`;
            }
        })
        .catch(err => { content.innerHTML = `<div class="text-center mt-20 text-red-500 font-bold">Network Error!</div>`; });
    }

    function renderPendingTable(pendingList) {
        if(pendingList.length === 0) {
            document.getElementById('pendingContent').innerHTML = `<div class="text-center mt-20 text-gray-500 font-bold">No pending requests.</div>`; return;
        }

        let html = `
            <table class="f-table">
                <thead>
                    <tr>
                        <th>Player Info</th>
                        <th>Level</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
        `;

        pendingList.forEach(p => {
            // FIX: Safe fallback for avatar extraction
            const avatarId = p.avatarId || p.avatar_id || 902000003;
            const avatar = getImgUrl(avatarId);
            const safeName = p.nickname.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            const disableAttr = (CURRENT_ROLE !== 'owner') ? 'disabled style="opacity:0.3;cursor:not-allowed;"' : '';

            html += `
                <tr>
                    <td>
                        <div class="flex items-center gap-3">
                            <img src="${avatar}" class="w-10 h-10 rounded-md bg-black border border-gray-700 cursor-pointer hover:border-gray-500" onclick="openProfileModal('${p.uid}')" onerror="this.src='https://via.placeholder.com/40'">
                            <div>
                                <div class="font-bold text-white text-sm cursor-pointer hover:text-blue-400 transition whitespace-nowrap truncate max-w-[150px]" onclick="openProfileModal('${p.uid}')" title="${p.nickname}">${p.nickname}</div>
                                <div class="font-mono text-yellow-500 text-[10px] cursor-pointer hover:underline" onclick="copyToClipboard('${p.uid}')">${p.uid}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="bg-gray-800 border border-gray-600 text-gray-300 px-2 py-0.5 rounded text-xs font-bold">Lv.${p.level}</span></td>
                    <td class="text-right">
                        <button ${disableAttr} onclick="handleFriendAction('${p.uid}', 'accept', '${safeName}')" class="bg-green-900/40 text-green-500 hover:bg-green-500 hover:text-white border border-green-500/50 px-3 py-1.5 rounded transition mr-2" title="Accept">
                            <i class="fa-solid fa-check"></i>
                        </button>
                        <button ${disableAttr} onclick="handleFriendAction('${p.uid}', 'reject', '${safeName}')" class="bg-red-900/40 text-red-500 hover:bg-red-500 hover:text-white border border-red-500/50 px-3 py-1.5 rounded transition" title="Reject">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        html += `</tbody></table>`;
        document.getElementById('pendingContent').innerHTML = html;
    }

    function handleFriendAction(friendUid, actionType, friendName) {
        const isAccept = actionType === 'accept';
        const title = isAccept ? "Accept Request?" : "Reject Request?";
        const msg = `Are you sure you want to ${actionType} <span class="text-white font-bold">${friendName}</span>'s friend request?`;
        const icon = isAccept ? "fa-solid fa-user-check text-green-500" : "fa-solid fa-user-xmark text-red-500";
        const btnText = isAccept ? "Yes, Accept" : "Yes, Reject";
        const btnClass = isAccept ? "bg-green-600 hover:bg-green-500" : "bg-red-600 hover:bg-red-500";

        showConfirmModal(title, msg, icon, btnText, btnClass, async () => {
            const res = await fetch(`${API_BASE}/friends/action`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    bot_name: currentBotForPending,
                    friend_uid: friendUid,
                    action: actionType
                })
            });
            const data = await res.json();
            
            if(data.status === 'success') {
                showToast(data.msg, "success");
                openPendingModal(currentBotForPending); // Auto reload list
            } else {
                showToast(data.msg, "error");
            }
        });
    }

    function closePendingModal(e, force=false) {
        if(force || e.target.id === 'pendingModal') { document.getElementById('pendingModal').classList.add('hidden'); }
    }
</script>
<!-- END OF FILE pending_requests.html -->
