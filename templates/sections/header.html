<!-- templates/sections/header.html -->
<header class="fixed top-0 inset-x-0 w-full bg-[#0f111a]/95 backdrop-blur-md border-b border-white/5 px-4 py-3.5 flex justify-between items-center shadow-2xl z-50 rounded-b-2xl">
    <div class="flex items-center">
        <!-- মেইন ড্যাশবোর্ডে (পেজ ১) ফিরে যাওয়ার সিকিউর ব্যাক বাটন -->
        <a href="/" class="w-10 h-10 rounded-xl bg-white/5 hover:bg-yellow-400 hover:text-black text-white flex items-center justify-center transition-all duration-300 shadow-[inset_0_1px_1px_rgba(255,255,255,0.1)]">
            <i class="fas fa-arrow-left text-sm"></i>
        </a>
    </div>

    <!-- গ্যান্ট্রি-মধ্যবর্তী গ্লোয়িং লোগো টাইটেল -->
    <div class="absolute left-1/2 transform -translate-x-1/2 flex items-center justify-center pointer-events-none select-none">
        <h1 class="font-orbitron font-black text-base md:text-lg tracking-[0.25em] uppercase text-white bg-gradient-to-r from-white via-yellow-300 to-yellow-500 bg-clip-text text-transparent drop-shadow-[0_0_15px_rgba(234,179,8,0.65)]">
            OUT <span class="text-yellow-400 drop-shadow-[0_0_12px_rgba(234,179,8,0.8)]">OF</span> LAW
        </h1>
    </div>

    <!-- ব্যালেন্সড এম্পটি স্পেস হোল্ডার (লোগোকে একুরেটলি মিডলে দেখানোর জন্য) -->
    <div class="w-10 h-10 pointer-events-none opacity-0"></div>
</header>
